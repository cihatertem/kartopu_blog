<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartopu Blog - Bakım Molası</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .snowball-container {
            max-width: 600px;
            background: white;
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 5px solid var(--accent-color);
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 25px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .loader {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(52, 152, 219, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="snowball-container">
        <div class="icon">❄️</div>
        <h1>Kartopu Büyüyor...</h1>
        <p>Şu anda sitemizde kısa bir bakım çalışması yapıyoruz. Altyapımızı daha performanslı hale getirmek için buraları biraz toparlıyoruz.</p>
        <div class="loader"></div>
        <p style="margin-top: 25px; font-size: 0.9rem; color: #888;">En kısa sürede geri döneceğiz.</p>
    </div>
</body>
</html>
